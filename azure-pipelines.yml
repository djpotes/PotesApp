trigger:
- main

pool:
  vmImage: 'windows-latest' # Recomendado para pruebas de UI en Windows

steps:
- task: UseDotNet@2
  inputs:
    version: '10.0.x' # Ajusta a la versión que uses

- script: dotnet build --configuration Release
  displayName: 'Compilar proyecto'

- task: DotNetCoreCLI@2
  inputs:
    command: 'test'
    projects: '**/*Test.csproj'
    arguments: '--configuration Release'
  displayName: 'Ejecutar pruebas NUnit'